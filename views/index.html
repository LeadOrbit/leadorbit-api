<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backend Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen">
    <div class="py-12 bg-white">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="lg:text-center">
          <h2
            class="text-base text-primary font-semibold tracking-wide uppercase"
          >
            Backend Services
          </h2>
          <p
            class="mt-2 text-3xl leading-8 font-extrabold tracking-tight text-dark sm:text-4xl"
          >
            Powerful API Infrastructure
          </p>
          <p class="mt-4 max-w-2xl text-xl text-gray-500 lg:mx-auto">
            Scalable, reliable backend services for your applications
          </p>
        </div>

        <div class="mt-10">
          <div class="grid grid-cols-1 gap-8 sm:grid-cols-2 lg:grid-cols-3">
            <div class="pt-6">
              <div class="flow-root bg-gray-50 rounded-lg px-6 pb-8 h-full">
                <div class="-mt-6">
                  <div
                    class="flex items-center justify-center h-12 w-12 rounded-md bg-primary text-white"
                  >
                    <i class="fas fa-bolt"></i>
                  </div>
                  <h3 class="mt-8 text-lg font-medium text-dark tracking-tight">
                    Fast Processing
                  </h3>
                  <p class="mt-5 text-base text-gray-500">
                    Optimized endpoints with sub-100ms response times
                  </p>
                </div>
              </div>
            </div>

            <div class="pt-6">
              <div class="flow-root bg-gray-50 rounded-lg px-6 pb-8 h-full">
                <div class="-mt-6">
                  <div
                    class="flex items-center justify-center h-12 w-12 rounded-md bg-primary text-white"
                  >
                    <i class="fas fa-shield-alt"></i>
                  </div>
                  <h3 class="mt-8 text-lg font-medium text-dark tracking-tight">
                    Secure
                  </h3>
                  <p class="mt-5 text-base text-gray-500">
                    Enterprise-grade security with JWT authentication
                  </p>
                </div>
              </div>
            </div>

            <div class="pt-6">
              <div class="flow-root bg-gray-50 rounded-lg px-6 pb-8 h-full">
                <div class="-mt-6">
                  <div
                    class="flex items-center justify-center h-12 w-12 rounded-md bg-primary text-white"
                  >
                    <i class="fas fa-chart-line"></i>
                  </div>
                  <h3 class="mt-8 text-lg font-medium text-dark tracking-tight">
                    Analytics
                  </h3>
                  <p class="mt-5 text-base text-gray-500">
                    Built-in monitoring and usage statistics
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
