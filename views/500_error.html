<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>500 - Server Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gradient-to-br from-gray-100 to-gray-300 min-h-screen flex flex-col items-center justify-center">
    <div class="text-center">
      <h1 class="text-9xl font-extrabold text-red-600">500</h1>
      <p class="text-2xl font-semibold text-gray-800 mt-4">Uh-oh! Something went wrong</p>
      <p class="text-gray-600 mt-2 text-lg">The server encountered an error. Please try again later.</p>
      
      <div class="flex justify-center mt-6">
        <img src="../server_error.avif" alt="Server Error" class="rounded-lg shadow-md w-72 h-auto" />
      </div>
    </div>
  </body>
</html>
