<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen flex">
    <!-- Sidebar -->
    <div
      id="sidebar"
      class="bg-white w-64 shadow-lg fixed h-full transform -translate-x-full transition-all duration-300 ease-in-out"
    >
      <div class="p-6 flex justify-between items-center">
        <h2 class="text-2xl font-bold text-gray-800">Dashboard</h2>
        <button
          id="close-sidebar"
          class="text-gray-600 hover:text-gray-800 focus:outline-none"
        >
          ✕
        </button>
      </div>
      <nav class="mt-6">
        <a
          href="/dashboard"
          class="block py-3 px-6 text-gray-700 hover:bg-blue-600 hover:text-white transition-colors duration-200"
          >Email Logs</a
        >
        <a
          href="/unsubscribedUsers"
          class="block py-3 px-6 text-gray-700 bg-blue-600 hover:text-white transition-colors duration-200"
          >Unsubscribed Users</a
        >
        <a
          href="/logout"
          class="block py-3 px-6 text-gray-700 hover:bg-blue-600 hover:text-white transition-colors duration-200 mt-4 border-t"
          >Logout</a
        >
      </nav>
    </div>

    <!-- Main Content -->
    <div
      id="main-content"
      class="flex-1 p-8 transition-all duration-300 ease-in-out"
    >
      <header
        class="bg-white shadow-md rounded-lg p-6 flex justify-between items-center"
      >
        <div class="flex items-center">
          <button
            id="toggle-sidebar"
            class="text-gray-600 hover:text-gray-800 focus:outline-none mr-4"
          >
            ☰
          </button>
          <h1 class="text-3xl font-bold text-gray-800">
            Welcome to Our Automation Web
          </h1>
        </div>
      </header>

      <!-- Dashboard Content -->
      <div id="email-logs" class="mt-8 bg-white p-6 rounded-lg shadow-md">
        <h3 class="text-lg font-semibold text-gray-800 mb-4">
          Unsubscribed Users
        </h3>

        <!-- Filter Input -->
        <div class="flex items-center mb-4 space-x-4">
          <input
            id="filter-email"
            type="text"
            placeholder="Filter by Email ID"
            class="border rounded p-2 focus:ring focus:ring-blue-300"
          />
          <button
            id="apply-filter"
            class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition-colors"
          >
            Apply Filter
          </button>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr
                class="bg-gray-200 text-gray-700 uppercase text-sm leading-normal"
              >
                <th class="px-6 py-3 border-b-2 border-gray-300">Email ID</th>
                <th class="px-6 py-3 border-b-2 border-gray-300">Reason</th>
                <th class="px-6 py-3 border-b-2 border-gray-300">
                  Unsubscribed On
                </th>
              </tr>
            </thead>
            <tbody id="email-logs-table" class="text-gray-700 text-sm"></tbody>
          </table>
        </div>

        <!-- Pagination Controls -->
        <div class="flex justify-between items-center mt-4">
          <button
            id="prev-page"
            class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition-colors"
          >
            Previous
          </button>
          <span id="pagination-info" class="text-gray-600"></span>
          <button
            id="next-page"
            class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition-colors"
          >
            Next
          </button>
        </div>
      </div>
    </div>

    <script>
       const sidebar = document.getElementById("sidebar");
      const toggleSidebarBtn = document.getElementById("toggle-sidebar");
      const closeSidebarBtn = document.getElementById("close-sidebar");
      const mainContent = document.getElementById("main-content");

      let isSidebarOpen = false; // Starts closed

      function toggleSidebar() {
        if (isSidebarOpen) {
          sidebar.classList.add("-translate-x-full");
          mainContent.classList.remove("ml-64");
        } else {
          sidebar.classList.remove("-translate-x-full");
          mainContent.classList.add("ml-64");
        }
        isSidebarOpen = !isSidebarOpen;
      }

      // Initialize sidebar state on page load
      document.addEventListener("DOMContentLoaded", () => {
        // If you want the sidebar to start open instead, change to:
        // isSidebarOpen = true;
        // sidebar.classList.remove("-translate-x-full");
        // mainContent.classList.add("ml-64");
      });

      toggleSidebarBtn.addEventListener("click", toggleSidebar);
      closeSidebarBtn.addEventListener("click", toggleSidebar);


      let currentPage = 1;
      let totalPages = 1;
      let filterEmail = "";

      async function fetchEmailLogs(page = 1) {
        const response = await fetch(
          `/api/v1/auth/blocked-emails?page=${page}&email_id=${filterEmail}`
        );
        const data = await response.json();

        const tableBody = document.getElementById("email-logs-table");
        tableBody.innerHTML = "";

        data.unsubscribedUsers.forEach((log, index) => {
          const row = document.createElement("tr");
          row.classList.add(
            index % 2 === 0 ? "bg-white" : "bg-gray-100",
            "hover:bg-gray-200",
            "transition"
          );

          row.innerHTML = `
            <td class="border px-6 py-3">${log.email_id}</td>
            <td class="border px-6 py-3">${log.reason}</td>
            <td class="border px-6 py-3">${new Date(
              log.createdAt
            ).toLocaleString()}</td>
          `;
          tableBody.appendChild(row);
        });

        currentPage = data.pagination.currentPage;
        totalPages = data.pagination.totalPages;

        document.getElementById(
          "pagination-info"
        ).textContent = `Page ${currentPage} of ${totalPages}`;
        document.getElementById("prev-page").disabled = currentPage === 1;
        document.getElementById("next-page").disabled =
          currentPage === totalPages;
      }

      document.getElementById("prev-page").addEventListener("click", () => {
        if (currentPage > 1) fetchEmailLogs(currentPage - 1);
      });

      document.getElementById("next-page").addEventListener("click", () => {
        if (currentPage < totalPages) fetchEmailLogs(currentPage + 1);
      });

      document.getElementById("apply-filter").addEventListener("click", () => {
        filterEmail = document.getElementById("filter-email").value.trim();
        currentPage = 1;
        fetchEmailLogs();
      });

      fetchEmailLogs();
    </script>
  </body>
</html>
