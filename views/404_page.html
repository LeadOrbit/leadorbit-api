<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gradient-to-br from-gray-100 to-gray-300 min-h-screen flex flex-col items-center justify-center">
    <div class="text-center">
      <h1 class="text-9xl font-extrabold text-blue-600">404</h1>
      <p class="text-2xl font-semibold text-gray-800 mt-4">Oops! Page not found</p>
      <p class="text-gray-600 mt-2 text-lg">The page you are looking for doesn’t exist or has been moved.</p>
      
      <div class="flex justify-center mt-6">
        <img src="../404.jpg" alt="Lost" class="rounded-lg shadow-md" />
      </div>
    </div>
  </body>
</html>
